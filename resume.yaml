        highlights:
          - Designed and developed a train timetable conflict detection algorithm from scratch, capable of analyzing a full-day schedule within 1-3 seconds, identifying route conflicts, capacity shortages, and insufficient charging time risks in real time
          - Built a timetable auto-generation algorithm from scratch, producing conflict-free schedules within a few seconds based on fleet size, time windows, passenger demand targets, and permitted routes
          - Developed a front-end visualization tool to display the entire daily timetable with millisecond precision, including track topology, vehicle positions, expected battery levels, signal states, and conflict root causes
          - Led the development of a Safety Server, integrating signals, vehicles, and timetables to handle dispatching, signal authorization requests, and vehicle movement authority issuance, ensuring safe and controlled train operations
