        position: Tech Lead
        start_date: 2026-04
        end_date: present
        location: New Taipei City, Taiwan
        highlights:
          - Lead a 3-5 person cloud team while continuing as primary IC on the Safety Server.
          - Own architecture across the team's services — timetabling, mission management, safety control, observability.
          - Partner with the CEO on H1/H2 roadmap and KPI planning.
          - Built an internal agent-based product-operations workflow system for LILEE/TAPAS, connecting Confluence, Jira, Discord, local scripts, and reusable domain skills to standardize SafeART release planning, TAPAS feature specs, delivery-map maintenance, candidate review, and KPI reporting.
          - Operationalized source-grounded Confluence/Jira workflows with live source-of-truth reads, durable task records, ADF validation, write-back controls, and post-write read-back verification, improving documentation governance and reducing stale planning artifacts.
          - Designed agent-assisted interview and planning pipelines, including resume-to-final-interview review records that reduced HR coordination overhead by ~90%, and spec-to-delivery-map-to-half-year-roadmap flows that align engineering detail with stakeholder-facing release commitments.
          - '**Skills**: Engineering Management, Hiring, Roadmap Planning, System Architecture, Agent-assisted Workflow Design, Confluence, Jira, Documentation Governance, Release Planning, KPI Reporting'
      - company: LILEE Systems
        position: Full Stack Engineer
        start_date: 2024-05
        end_date: 2026-03
        location: New Taipei City, Taiwan
        highlights:
          - Built the platform's train timetabling stack from scratch — full-day conflict detection (1-3s), auto-generation of conflict-free schedules from fleet/demand/route inputs, and a millisecond-precision visualization exposing track state, vehicle positions, signals, and conflict roots.
          - Re-architected the Safety Server from a stateless service into a two-tier stateful system (Core Services + Mission Execution) with explicit mission FSM and Movement Authority lifecycle — turning silently-stuck missions into something the team can debug in seconds via Grafana.
          - Designed Faramund, the platform's breakdown-recovery agent — a 28-state FSM that orchestrates the cloud services and field operators over WebSocket, replacing a multi-team manual workflow.
          - Built seshat-go from scratch — a Go + TimescaleDB service that records MQTT traffic across the testbed and replays module state, making cross-module incidents debuggable for the entire team.
          - Stood up Playwright E2E automation gated through Jenkins CI — the suite blocks image publishing on failure, catching regressions before they reach QA.
          - '**Skills**: Python (FastAPI, GraphQL, SQLAlchemy, asyncio), TypeScript (D3.js, Angular, PrimeNG), Go, MQTT, PostgreSQL, TimescaleDB, Docker, Playwright, Jenkins, Grafana, FSM Design'
