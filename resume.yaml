    about: 
      - I'm a Full Stack Engineer with 5+ years of experience specializing in algorithm development, enterprise software solutions, and AI integration. Currently at LILEE Systems, I develop critical transportation algorithms including train timetable conflict detection and auto-generation systems that process full-day schedules in seconds. Previously, as AI Technical Lead at WeBIM Services, I built enterprise knowledge management and intelligent customer service systems using Azure AI and OpenAI GPT, reducing customer service workload by 86%. My background includes extensive full-stack development with modern technologies like Python (FastAPI), TypeScript (Vue, Angular), and cloud platforms, alongside expertise in BIM automation, 3D visualization, and CI/CD processes. I hold a Master's degree in Transportation Engineering from National Taiwan University and am Microsoft Azure AI Engineer certified, with published research in real-time indoor localization systems.
