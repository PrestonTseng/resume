      - Full-stack engineer working on safety-critical systems for autonomous rail transit. At LILEE Systems I own the Safety Server — the cloud platform's safety-critical control core, issuing movement authority and signal commands from the active timetable — and built the team's timetabling algorithms, breakdown-recovery automation, and cross-module observability tooling. Master's in Transportation Engineering from National Taiwan University; earlier roles spanned BIM automation and enterprise AI.
    experience:
